name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://newlife-api-agfzb6a7bdb5b7bq.eastus-01.azurewebsites.net/api/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend cold-starting, waiting 40s and retrying..."
            sleep 40
            curl -s --max-time 30 \
              https://newlife-api-agfzb6a7bdb5b7bq.eastus-01.azurewebsites.net/api/health || true
          fi
